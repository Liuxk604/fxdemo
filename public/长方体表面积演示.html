                &lt;div class=&quot;flex items-center&quot;&gt;&lt;div class=&quot;w-3 h-3 rounded-full bg-red-400 mr-2&quot;&gt;&lt;/div&gt;&lt;span&gt;上下 (长&times;宽)&lt;/span&gt;&lt;/div&gt;
                &lt;div class=&quot;flex items-center&quot;&gt;&lt;div class=&quot;w-3 h-3 rounded-full bg-yellow-400 mr-2&quot;&gt;&lt;/div&gt;&lt;span&gt;前后 (长&times;高)&lt;/span&gt;&lt;/div&gt;
                &lt;div class=&quot;flex items-center&quot;&gt;&lt;div class=&quot;w-3 h-3 rounded-full bg-cyan-400 mr-2&quot;&gt;&lt;/div&gt;&lt;span&gt;左右 (宽&times;高)&lt;/span&gt;&lt;/div&gt;

    &lt;script type=&quot;module&quot;&gt;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf9fafb);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        // 调整相机位置，使其更近，物体显示更大
        camera.position.set(6, 6, 8);
        camera.lookAt(0, 1, 0); // 初始看向物体中心 (h/2 = 1)

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = false;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 2;
        controls.maxDistance = 40;
        // 设置控制器焦点为长方体中心 (0, h/2, 0)
        controls.target.set(0, 1, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(10, 20, 10);
        // dirLight.castShadow = true;
        scene.add(dirLight);
        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight2.position.set(-10, 10, -10);
        scene.add(dirLight2);

        const params = { a: 4, b: 3, h: 2 };
        let currentMode = 'full';

        // 材质：使用 DoubleSide 且降低透明度以减少渲染问题，或者干脆不透明但颜色区分明显
        // 为了&ldquo;清晰直观&rdquo;，我们使用不透明材质，或者非常轻微的透明
        const createMat = (color) =&gt; new THREE.MeshBasicMaterial({ 
            color: color, 
            side: THREE.DoubleSide, 
            transparent: false, 
            opacity: 1
        });

        const materials = {
            topBottom: createMat(0xEF4444), // Red
            frontBack: createMat(0xF59E0B), // Yellow
            leftRight: createMat(0x06B6D4), // Cyan
            // 移除高亮材质，点击时只改变透明度或显示文字
        };

        // 创建面和边框
        function createFaceMesh(width, height, material, name, formula) {
            const group = new THREE.Group();
            // PlaneGeometry 默认在 XY 平面
            const geometry = new THREE.PlaneGeometry(width, height);
            const mesh = new THREE.Mesh(geometry, material.clone());
            mesh.name = name;
            mesh.userData = { formula: formula }; // 存储公式
            // mesh.receiveShadow = true;
            // mesh.castShadow = true;
            
            // 旋转 Mesh 使其平铺在 XZ 平面 (法线朝上)
            mesh.rotation.x = -Math.PI / 2;
            
            group.add(mesh);

            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1 }));
            line.rotation.x = -Math.PI / 2;
            group.add(line);

            return { group, mesh };
        }

        const root = new THREE.Group();
        scene.add(root);

        // 全局变量
        let bottomObj, frontGroup, frontObj, backGroup, backObj, topGroup, topObj, leftGroup, leftObj, rightGroup, rightObj;
        let interactableMeshes = [];
        let formulaLabelObjects = [];
        let foldedLabelData = [];
        let unfoldedLabelData = [];
        let foldedLabelEls = [];
        let unfoldedLabelEls = [];

        // 构建场景函数
        function buildScene() {
            // 清理旧内容
            while(root.children.length &gt; 0){ 
                root.remove(root.children[0]); 
            }
            document.getElementById('labels-container').innerHTML = '';
            interactableMeshes = [];
            formulaLabelObjects = [];
            foldedLabelEls = [];
            unfoldedLabelEls = [];

            // 1. 下底面 (Bottom) - 中心在原点
            bottomObj = createFaceMesh(params.a, params.b, materials.topBottom, &quot;下底面&quot;, &quot;a &times; b&quot;);
            root.add(bottomObj.group);

            // 2. 前面 (Front) - 连接在 Bottom 的 Z+ 边 (z = b/2)
            frontGroup = new THREE.Group();
            frontGroup.position.set(0, 0, params.b / 2);
            frontObj = createFaceMesh(params.a, params.h, materials.frontBack, &quot;前面&quot;, &quot;a &times; h&quot;);
            // 平铺时，向前延伸 (Z+)，中心在 Z = h/2
            frontObj.group.position.set(0, 0, params.h / 2);
            frontGroup.add(frontObj.group);
            root.add(frontGroup);

            // 3. 后面 (Back) - 连接在 Bottom 的 Z- 边 (z = -b/2)
            backGroup = new THREE.Group();
            backGroup.position.set(0, 0, -params.b / 2);
            backObj = createFaceMesh(params.a, params.h, materials.frontBack, &quot;后面&quot;, &quot;a &times; h&quot;);
            // 平铺时，向后延伸 (Z-)，中心在 Z = -h/2
            backObj.group.position.set(0, 0, -params.h / 2);
            backGroup.add(backObj.group);
            root.add(backGroup);

            // 4. 上底面 (Top) - 连接在 Back 的 Z- 边 (级联)
            topGroup = new THREE.Group();
            // 连接点在 Back 平铺时的末端 (Z = -h)。注意这里是相对于 BackGroup 的局部坐标
            topGroup.position.set(0, 0, -params.h);
            topObj = createFaceMesh(params.a, params.b, materials.topBottom, &quot;上底面&quot;, &quot;a &times; b&quot;);
            // 平铺时，继续向后延伸 (Z-)，中心在 Z = -b/2
            topObj.group.position.set(0, 0, -params.b / 2);
            topGroup.add(topObj.group); // 修正：添加到 topGroup
            backGroup.add(topGroup); // Top 是 Back 的子节点

            // 5. 左面 (Left) - 连接在 Bottom 的 X- 边 (x = -a/2)
            leftGroup = new THREE.Group();
            leftGroup.position.set(-params.a / 2, 0, 0);
            // 平铺时，向左延伸 (X-)，中心在 X = -h/2
            // 注意：createFaceMesh(width, height)。这里 width=h, height=b。
            // 默认 PlaneGeometry 是 X(width) Z(height)。
            // 我们需要它在 X 轴延伸 h，Z 轴延伸 b。
            leftObj = createFaceMesh(params.h, params.b, materials.leftRight, &quot;左面&quot;, &quot;b &times; h&quot;);
            leftObj.group.position.set(-params.h / 2, 0, 0);
            leftGroup.add(leftObj.group);
            root.add(leftGroup);

            // 6. 右面 (Right) - 连接在 Bottom 的 X+ 边 (x = a/2)
            rightGroup = new THREE.Group();
            rightGroup.position.set(params.a / 2, 0, 0);
            // 平铺时，向右延伸 (X+)，中心在 X = h/2
            rightObj = createFaceMesh(params.h, params.b, materials.leftRight, &quot;右面&quot;, &quot;b &times; h&quot;);
            rightObj.group.position.set(params.h / 2, 0, 0);
            rightGroup.add(rightObj.group);
            root.add(rightGroup);

            // 收集交互对象
            interactableMeshes = [
                bottomObj.mesh, frontObj.mesh, backObj.mesh,
                topObj.mesh, leftObj.mesh, rightObj.mesh
            ];

            // 重建标签
            rebuildLabels();
            
            // 应用当前状态
            const sliderVal = document.getElementById('unfold-slider') ? parseFloat(document.getElementById('unfold-slider').value) / 100 : 0;
            updateUnfold(sliderVal);
            setMode(currentMode);
        }

        function rebuildLabels() {
            // 公式标签
            formulaLabelObjects = interactableMeshes.map(mesh =&gt; {
                return {
                    el: createLabelEl(mesh.userData.formula, 'label-3d text-lg font-bold text-white drop-shadow-md'),
                    mesh: mesh
                };
            });

            // 边长标签 (静态定义，根据展开/合拢状态计算位置)
            foldedLabelData = [
                // a (长): 前面下边缘中心
                { text: 'a', getPos: () =&gt; new THREE.Vector3(0, -0.3, params.b/2 + 0.3) },
                // h (高): 前面左边缘中心
                { text: 'h', getPos: () =&gt; new THREE.Vector3(-params.a/2 - 0.3, params.h/2, params.b/2 + 0.3) },
                // b (宽): 右面下边缘中心
                { text: 'b', getPos: () =&gt; new THREE.Vector3(params.a/2 + 0.3, -0.3, 0) }
            ];

            unfoldedLabelData = [
                // Bottom 周围
                { text: 'a', face: 'bottom', getPos: () =&gt; new THREE.Vector3(0, 0, params.b/2 + 0.2) }, // Bottom 下边 (连接 Front)
                { text: 'b', face: 'bottom', getPos: () =&gt; new THREE.Vector3(params.a/2 + 0.2, 0, 0) }, // Bottom 右边
                
                // Front 周围
                { text: 'h', face: 'front', getPos: () =&gt; new THREE.Vector3(params.a/2 + 0.2, 0, params.b/2 + params.h/2) }, // Front 右边
                { text: 'a', face: 'front', getPos: () =&gt; new THREE.Vector3(0, 0, params.b/2 + params.h + 0.2) }, // Front 下边

                // Back 周围
                { text: 'h', face: 'back', getPos: () =&gt; new THREE.Vector3(params.a/2 + 0.2, 0, -params.b/2 - params.h/2) }, // Back 右边
                
                // Top 周围
                { text: 'b', face: 'top', getPos: () =&gt; new THREE.Vector3(params.a/2 + 0.2, 0, -params.b/2 - params.h - params.b/2) }, // Top 右边
                { text: 'a', face: 'top', getPos: () =&gt; new THREE.Vector3(0, 0, -params.b/2 - params.h - params.b - 0.2) }, // Top 上边

                // Left 周围
                { text: 'h', face: 'left', getPos: () =&gt; new THREE.Vector3(-params.a/2 - params.h/2, 0, params.b/2 + 0.2) }, // Left 下边
                { text: 'b', face: 'left', getPos: () =&gt; new THREE.Vector3(-params.a/2 - params.h - 0.2, 0, 0) }, // Left 左边

                // Right 周围
                { text: 'h', face: 'right', getPos: () =&gt; new THREE.Vector3(params.a/2 + params.h/2, 0, params.b/2 + 0.2) }, // Right 下边
                { text: 'b', face: 'right', getPos: () =&gt; new THREE.Vector3(params.a/2 + params.h + 0.2, 0, 0) }, // Right 右边
            ];

            foldedLabelEls = foldedLabelData.map(l =&gt; ({ el: createLabelEl(l.text), ...l }));
            unfoldedLabelEls = unfoldedLabelData.map(l =&gt; ({ el: createLabelEl(l.text), ...l }));
        }

        // 初始构建
        // buildScene(); // 移到最后，确保所有依赖（如 labelsContainer）已初始化

        // 参数更新函数
        window.updateParams = (key, value) =&gt; {
            params[key] = parseFloat(value);
            document.getElementById('val-' + key).textContent = params[key];
            buildScene();
        };

        // --- 动画逻辑 ---
        // progress: 0 (立体/合拢) -&gt; 1 (平面/展开)
        
        function updateUnfold(progress) {
            // 转换为合拢程度: 1 (合拢) -&gt; 0 (展开)
            const fold = 1 - progress;
            const angle90 = Math.PI / 2 * fold;

            // Front: 绕 X 轴转 -90度 (从 Z+ 立起到 Y+)
            frontGroup.rotation.x = -angle90;

            // Back: 绕 X 轴转 90度 (从 Z- 立起到 Y+)
            backGroup.rotation.x = angle90;

            // Top: 相对于 Back 再转 90度 (从 Back 的延伸方向盖过来)
            // Back 转了 90，Top 再转 90，总共 180，正好盖在 Bottom 上
            topGroup.rotation.x = angle90;

            // Left: 绕 Z 轴转 -90度 (从 X- 立起到 Y+)
            // 修正：左面在 X 负轴，要立起来(Y+)，需要顺时针旋转(绕 Z 轴负方向?)
            // Z 轴朝外。从 X- (-1,0) 到 Y+ (0,1)。这是 -90 度。
            leftGroup.rotation.z = -angle90;

            // Right: 绕 Z 轴转 90度 (从 X+ 立起到 Y+)
            // 从 X+ (1,0) 到 Y+ (0,1)。这是 +90 度。
            rightGroup.rotation.z = angle90;
        }

        // --- 交互 ---
        const slider = document.getElementById('unfold-slider');
        const angleDisplay = document.getElementById('angle-display');

        slider.addEventListener('input', (e) =&gt; {
            const val = parseFloat(e.target.value) / 100;
            updateUnfold(val);
            angleDisplay.textContent = Math.round(val * 100) + '%';
            updateLabels(val);
        });

        window.setMode = (mode) =&gt; {
            currentMode = mode;
            document.querySelectorAll('.btn-mode').forEach(btn =&gt; btn.classList.remove('active'));
            if(mode === 'full') document.getElementById('btn-full').classList.add('active');
            if(mode === 'no-top') document.getElementById('btn-no-top').classList.add('active');
            if(mode === 'no-bottom') document.getElementById('btn-no-bottom').classList.add('active');
            if(mode === 'side-only') document.getElementById('btn-side-only').classList.add('active');

            // 控制 Top 面可见性
            if(topObj) topObj.group.visible = (mode === 'full' || mode === 'no-bottom');
            
            // 控制 Bottom 面可见性
            if(bottomObj) bottomObj.group.visible = (mode === 'full' || mode === 'no-top');
        };

        // 高亮逻辑
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMesh = null;

        window.addEventListener('click', (event) =&gt; {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableMeshes);

            if (intersects.length &gt; 0) {
                const object = intersects[0].object;
                let visible = true;
                object.traverseAncestors(p =&gt; { if(!p.visible) visible = false; });
                if (visible) highlightFace(object);
            } else {
                if (event.target.tagName === 'CANVAS') highlightFace(null);
            }
        });

        function highlightFace(mesh) {
            // 恢复之前的状态（这里不再改变材质颜色，只处理文字显示）
            if (selectedMesh) {
                // 可以在这里恢复透明度等，如果需要的话
            }
            selectedMesh = mesh;
            const infoEl = document.getElementById('selected-face-name');
            
            // 更新所有公式标签的显示状态
            updateFormulaLabels();

            if (mesh) {
                infoEl.textContent = mesh.name + ' (' + mesh.userData.formula + ')';
            } else {
                infoEl.textContent = '无';
            }
        }

        // --- 标注系统 ---
        // 1. 边长标注 (a, b, h)
        // 2. 面积公式标注 (a&times;b)
        
        const labelsContainer = document.getElementById('labels-container');
        
        // 创建标签元素
        function createLabelEl(text, className = 'label-3d') {
            const el = document.createElement('div');
            el.className = className;
            el.textContent = text;
            labelsContainer.appendChild(el);
            return el;
        }

        // 标签定义已移至 buildScene 中
        
        function updateFormulaLabels() {
            formulaLabelObjects.forEach(item =&gt; {
                // 只有当 Mesh 被选中时才显示公式
                const isSelected = (selectedMesh === item.mesh);
                item.el.style.opacity = isSelected ? 1 : 0;
                
                if (isSelected) {
                    const vector = new THREE.Vector3();
                    item.mesh.getWorldPosition(vector);
                    vector.project(camera);
                    const x = (vector.x * .5 + .5) * window.innerWidth;
                    const y = (-(vector.y * .5) + .5) * window.innerHeight;
                    item.el.style.left = `${x}px`;
                    item.el.style.top = `${y}px`;
                }
            });
        }

        function updateLabels(progress) {
            // progress: 0 (立体) -&gt; 1 (展开)
            // 0-0.1 显示立体标注
            // 0.9-1.0 显示展开标注
            
            const showFolded = progress &lt; 0.1;
            const showUnfolded = progress &gt; 0.9;

            foldedLabelEls.forEach(l =&gt; {
                l.el.style.opacity = showFolded ? 1 : 0;
                if (showFolded) {
                    const pos = l.getPos().clone();
                    // 简单的立体位置修正 - 已移除，直接在 getPos 中定义准确的世界坐标
                    // pos.y += params.h/2;
                    pos.project(camera);
                    const x = (pos.x * .5 + .5) * window.innerWidth;
                    const y = (-(pos.y * .5) + .5) * window.innerHeight;
                    l.el.style.left = `${x}px`;
                    l.el.style.top = `${y}px`;
                }
            });

            unfoldedLabelEls.forEach(l =&gt; {
                // 检查可见性
                let visible = showUnfolded;
                if (visible) {
                    if (currentMode === 'no-top' &amp;&amp; l.face === 'top') visible = false;
                    if (currentMode === 'no-bottom' &amp;&amp; l.face === 'bottom') visible = false;
                    if (currentMode === 'side-only' &amp;&amp; (l.face === 'top' || l.face === 'bottom')) visible = false;
                }

                l.el.style.opacity = visible ? 1 : 0;
                if (visible) {
                    const pos = l.getPos().clone();
                    pos.project(camera);
                    const x = (pos.x * .5 + .5) * window.innerWidth;
                    const y = (-(pos.y * .5) + .5) * window.innerHeight;
                    l.el.style.left = `${x}px`;
                    l.el.style.top = `${y}px`;
                }
            });
            
            // 实时更新公式标签位置（如果选中了）
            updateFormulaLabels();
        }

        // 确保所有函数定义后再调用初始化
        buildScene();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateLabels(parseFloat(slider.value)/100);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () =&gt; {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
