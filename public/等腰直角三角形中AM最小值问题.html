    &lt;script&gt;
        class GeometryDemo {
            constructor() {
                this.canvas = document.getElementById('geometryCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // 坐标系设置
                this.centerX = 350;
                this.centerY = 275;
                this.scale = 70;
                
                // 三角形顶点（世界坐标）
                this.A = [-2, 0];  // A(-2, 0)
                this.B = [2, 0];   // B(2, 0)  
                this.C = [0, 2];   // C(0, 2)
                
                // M轨迹圆心
                this.mTrajectoryCenter = [0, 1];
                this.mTrajectoryRadius = 1;
                
                // 计算A到M轨迹圆心的距离
                this.distanceAToCenter = Math.sqrt(
                    Math.pow(this.A[0] - this.mTrajectoryCenter[0], 2) + 
                    Math.pow(this.A[1] - this.mTrajectoryCenter[1], 2)
                );
                
                // 动画参数
                this.theta = 0;
                this.animationSpeed = 1;
                this.isAnimating = false;
                this.animationId = null;
                this.direction = 1;
                
                // 轨迹记录
                this.pTrajectory = [];
                this.mTrajectory = [];
                this.showTrajectory = true;
                
                // 最小值相关
                this.minDistance = Math.sqrt(5) - 1;
                this.minTheta = Math.atan2(-1, -2) + Math.PI;
                this.minP = null;
                this.minM = null;
                
                this.initControls();
                this.draw();
            }
            
            initControls() {
                document.getElementById('startBtn').addEventListener('click', () =&gt; {
                    this.startAnimation();
                });
                
                document.getElementById('pauseBtn').addEventListener('click', () =&gt; {
                    this.togglePause();
                });
                
                document.getElementById('resetBtn').addEventListener('click', () =&gt; {
                    this.reset();
                });
                
                document.getElementById('speedSlider').addEventListener('input', (e) =&gt; {
                    this.animationSpeed = parseFloat(e.target.value);
                    document.getElementById('speedValue').textContent = this.animationSpeed.toFixed(1) + 'x';
                });
                
                document.getElementById('angleSlider').addEventListener('input', (e) =&gt; {
                    if (!this.isAnimating) {
                        this.theta = parseInt(e.target.value) * Math.PI / 180;
                        document.getElementById('angleValue').textContent = e.target.value + '&deg;';
                        this.draw();
                    }
                });
            }
            
            worldToScreen(x, y) {
                return [
                    this.centerX + x * this.scale,
                    this.centerY - y * this.scale
                ];
            }
            
            getCurrentP() {
                return [2 * Math.cos(this.theta), -2 * Math.sin(this.theta)];
            }
            
            getCurrentM() {
                const P = this.getCurrentP();
                return [(P[0] + this.C[0]) / 2, (P[1] + this.C[1]) / 2];
            }
            
            getAMDistance() {
                const M = this.getCurrentM();
                const dx = M[0] - this.A[0];
                const dy = M[1] - this.A[1];
                return Math.sqrt(dx * dx + dy * dy);
            }
            
            calculateMinValuePosition() {
                this.minP = [2 * Math.cos(this.minTheta), -2 * Math.sin(this.minTheta)];
                this.minM = [(this.minP[0] + this.C[0]) / 2, (this.minP[1] + this.C[1]) / 2];
            }
            
            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.drawCoordinateSystem();
                this.drawTriangle();
                this.drawACenterConnection();
                this.drawMTrajectoryCenter();
                this.drawPLowerSemicircleTrajectory();
                
                if (this.showTrajectory) {
                    this.drawMTrajectory();
                }
                
                this.drawMinValueMarker();
                this.drawDynamicElements();
                this.updateInfo();
            }
            
            drawCoordinateSystem() {
                this.ctx.save();
                this.ctx.strokeStyle = '#f0f0f0';
                this.ctx.lineWidth = 1;
                
                for (let i = -5; i &lt;= 5; i++) {
                    if (i === 0) continue;
                    
                    const x = this.centerX + i * this.scale;
                    if (x &gt; 0 &amp;&amp; x &lt; this.canvas.width) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(x, 50);
                        this.ctx.lineTo(x, this.canvas.height - 50);
                        this.ctx.stroke();
                    }
                    
                    const y = this.centerY - i * this.scale;
                    if (y &gt; 50 &amp;&amp; y &lt; this.canvas.height - 50) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(50, y);
                        this.ctx.lineTo(this.canvas.width - 50, y);
                        this.ctx.stroke();
                    }
                }
                
                this.ctx.strokeStyle = '#888';
                this.ctx.lineWidth = 2;
                
                this.ctx.beginPath();
                this.ctx.moveTo(50, this.centerY);
                this.ctx.lineTo(this.canvas.width - 50, this.centerY);
                this.ctx.stroke();
                
                this.ctx.beginPath();
                this.ctx.moveTo(this.centerX, 50);
                this.ctx.lineTo(this.centerX, this.canvas.height - 50);
                this.ctx.stroke();
                
                this.ctx.fillStyle = '#666';
                this.ctx.font = '16px SimSun';
                this.ctx.fillText('O', this.centerX + 5, this.centerY - 5);
                
                this.ctx.restore();
            }
            
            drawTriangle() {
                this.ctx.save();
                
                const screenA = this.worldToScreen(this.A[0], this.A[1]);
                const screenB = this.worldToScreen(this.B[0], this.B[1]);
                const screenC = this.worldToScreen(this.C[0], this.C[1]);
                
                this.ctx.strokeStyle = '#1e40af';
                this.ctx.fillStyle = 'rgba(30, 64, 175, 0.1)';
                this.ctx.lineWidth = 3;
                
                this.ctx.beginPath();
                this.ctx.moveTo(screenA[0], screenA[1]);
                this.ctx.lineTo(screenB[0], screenB[1]);
                this.ctx.lineTo(screenC[0], screenC[1]);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.stroke();
                
                this.ctx.fillStyle = '#1e40af';
                this.ctx.font = 'bold 20px SimSun';
                this.ctx.fillText('A', screenA[0] - 25, screenA[1] + 25);
                this.ctx.fillText('B', screenB[0] + 15, screenB[1] + 25);
                this.ctx.fillText('C', screenC[0] - 15, screenC[1] - 15);
                
                this.ctx.font = '16px SimSun';
                this.ctx.fillStyle = '#666';
                this.ctx.fillText('2&radic;2cm', (screenA[0] + screenC[0]) / 2 - 35, (screenA[1] + screenC[1]) / 2 - 5);
                this.ctx.fillText('2&radic;2cm', (screenB[0] + screenC[0]) / 2 + 15, (screenB[1] + screenC[1]) / 2 - 5);
                this.ctx.fillText('AB = 4cm', (screenA[0] + screenB[0]) / 2, screenA[1] + 35);
                
                this.ctx.restore();
            }
            
            drawACenterConnection() {
                this.ctx.save();
                
                const screenA = this.worldToScreen(this.A[0], this.A[1]);
                const screenCenter = this.worldToScreen(this.mTrajectoryCenter[0], this.mTrajectoryCenter[1]);
                
                this.ctx.strokeStyle = '#1976d2';
                this.ctx.lineWidth = 3;
                this.ctx.setLineDash([8, 6]);
                this.ctx.beginPath();
                this.ctx.moveTo(screenA[0], screenA[1]);
                this.ctx.lineTo(screenCenter[0], screenCenter[1]);
                this.ctx.stroke();
                this.ctx.setLineDash([]);
                
                const midPoint = [(screenA[0] + screenCenter[0]) / 2, (screenA[1] + screenCenter[1]) / 2];
                this.ctx.fillStyle = '#1976d2';
                this.ctx.font = 'bold 16px SimSun';
                this.ctx.fillText(`&radic;5 &asymp; ${this.distanceAToCenter.toFixed(3)}cm`, midPoint[0] - 30, midPoint[1] - 8);
                
                this.ctx.restore();
            }
            
            drawMTrajectoryCenter() {
                this.ctx.save();
                
                const screenCenter = this.worldToScreen(this.mTrajectoryCenter[0], this.mTrajectoryCenter[1]);
                
                this.ctx.fillStyle = '#16a34a';
                this.ctx.beginPath();
                this.ctx.arc(screenCenter[0], screenCenter[1], 8, 0, 2 * Math.PI);
                this.ctx.fill();
                
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 3;
                this.ctx.stroke();
                
                this.ctx.fillStyle = '#16a34a';
                this.ctx.font = 'bold 16px SimSun';
                this.ctx.fillText('M轨迹圆心', screenCenter[0] + 15, screenCenter[1] - 10);
                this.ctx.font = '16px SimSun';
                this.ctx.fillText(`(${this.mTrajectoryCenter[0]}, ${this.mTrajectoryCenter[1]})`, screenCenter[0] + 15, screenCenter[1] + 5);
                this.ctx.fillText(`r = ${this.mTrajectoryRadius}cm`, screenCenter[0] + 15, screenCenter[1] + 20);
                
                this.ctx.restore();
            }
            
            drawPLowerSemicircleTrajectory() {
                this.ctx.save();
                
                const screenCenter = this.worldToScreen(0, 0);
                const radius = 2 * this.scale;
                
                const gradient = this.ctx.createLinearGradient(
                    screenCenter[0] + radius, screenCenter[1],
                    screenCenter[0] - radius, screenCenter[1]
                );
                gradient.addColorStop(0, '#f97316');
                gradient.addColorStop(1, '#dc2626');
                
                this.ctx.strokeStyle = gradient;
                this.ctx.lineWidth = 5;
                
                this.ctx.beginPath();
                this.ctx.arc(screenCenter[0], screenCenter[1], radius, 0, Math.PI, false);
                this.ctx.stroke();
                
                const screenA = this.worldToScreen(this.A[0], this.A[1]);
                const screenB = this.worldToScreen(this.B[0], this.B[1]);
                
                this.ctx.fillStyle = '#f97316';
                this.ctx.font = 'bold 18px SimSun';
                this.ctx.fillText('B起点', screenB[0] + 15, screenB[1] + 35);
                this.ctx.fillText('&rarr;', screenB[0] - 25, screenB[1] + 15);
                
                this.ctx.fillStyle = '#dc2626';
                this.ctx.fillText('A终点', screenA[0] - 35, screenA[1] + 35);
                this.ctx.fillText('&larr;', screenA[0] + 15, screenA[1] + 15);
                
                this.ctx.fillStyle = '#dc2626';
                this.ctx.font = 'bold 16px SimSun';
                this.ctx.fillText('P点轨迹（AB下侧半圆B&rarr;A）', screenCenter[0] - 100, screenCenter[1] + radius + 25);
                
                this.ctx.restore();
            }
            
            drawMTrajectory() {
                if (this.mTrajectory.length &lt; 2) return;
                
                this.ctx.save();
                this.ctx.strokeStyle = 'rgba(220, 38, 38, 0.8)';
                this.ctx.lineWidth = 3;
                
                this.ctx.beginPath();
                const firstPoint = this.worldToScreen(this.mTrajectory[0][0], this.mTrajectory[0][1]);
                this.ctx.moveTo(firstPoint[0], firstPoint[1]);
                
                for (let i = 1; i &lt; this.mTrajectory.length; i++) {
                    const point = this.worldToScreen(this.mTrajectory[i][0], this.mTrajectory[i][1]);
                    this.ctx.lineTo(point[0], point[1]);
                }
                
                this.ctx.stroke();
                
                if (this.mTrajectory.length &gt; 10) {
                    const midTrajectory = this.worldToScreen(
                        this.mTrajectory[Math.floor(this.mTrajectory.length / 2)][0],
                        this.mTrajectory[Math.floor(this.mTrajectory.length / 2)][1]
                    );
                    this.ctx.fillStyle = '#dc2626';
                    this.ctx.font = 'bold 16px SimSun';
                    this.ctx.fillText('M点轨迹', midTrajectory[0] + 10, midTrajectory[1] - 10);
                }
                
                this.ctx.restore();
            }
            
            drawMinValueMarker() {
                if (!this.minP || !this.minM) {
                    this.calculateMinValuePosition();
                }
                
                const screenMinP = this.worldToScreen(this.minP[0], this.minP[1]);
                const screenMinM = this.worldToScreen(this.minM[0], this.minM[1]);
                const screenA = this.worldToScreen(this.A[0], this.A[1]);
                
                this.ctx.save();
                
                this.ctx.fillStyle = '#f59e0b';
                this.ctx.beginPath();
                this.ctx.arc(screenMinP[0], screenMinP[1], 10, 0, 2 * Math.PI);
                this.ctx.fill();
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                
                this.ctx.fillStyle = '#f59e0b';
                this.ctx.beginPath();
                this.ctx.arc(screenMinM[0], screenMinM[1], 8, 0, 2 * Math.PI);
                this.ctx.fill();
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                
                this.ctx.fillStyle = '#f59e0b';
                this.ctx.font = 'bold 18px SimSun';
                this.ctx.fillText('★', screenMinP[0] - 8, screenMinP[1] - 15);
                this.ctx.fillText('★', screenMinM[0] - 8, screenMinM[1] - 15);
                
                const midMinAM = [(screenA[0] + screenMinM[0]) / 2, (screenA[1] + screenMinM[1]) / 2];
                this.ctx.fillStyle = '#f59e0b';
                this.ctx.font = 'bold 16px SimSun';
                this.ctx.fillText(`最小值 = ${this.minDistance.toFixed(3)}cm`, midMinAM[0] - 40, midMinAM[1] - 20);
                
                this.ctx.restore();
            }
            
            drawDynamicElements() {
                const P = this.getCurrentP();
                const M = this.getCurrentM();
                
                const screenP = this.worldToScreen(P[0], P[1]);
                const screenM = this.worldToScreen(M[0], M[1]);
                const screenA = this.worldToScreen(this.A[0], this.A[1]);
                const screenC = this.worldToScreen(this.C[0], this.C[1]);
                
                this.ctx.save();
                
                this.ctx.strokeStyle = '#16a34a';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(screenP[0], screenP[1]);
                this.ctx.lineTo(screenC[0], screenC[1]);
                this.ctx.stroke();
                
                const currentDistance = this.getAMDistance();
                const isNearMin = Math.abs(currentDistance - this.minDistance) &lt; 0.1;
                
                this.ctx.strokeStyle = isNearMin ? '#f59e0b' : '#2563eb';
                this.ctx.lineWidth = isNearMin ? 4 : 3;
                this.ctx.beginPath();
                this.ctx.moveTo(screenA[0], screenA[1]);
                this.ctx.lineTo(screenM[0], screenM[1]);
                this.ctx.stroke();
                
                const pGradient = this.ctx.createRadialGradient(screenP[0], screenP[1], 0, screenP[0], screenP[1], 10);
                pGradient.addColorStop(0, '#f97316');
                pGradient.addColorStop(1, '#dc2626');
                this.ctx.fillStyle = pGradient;
                this.ctx.beginPath();
                this.ctx.arc(screenP[0], screenP[1], 10, 0, 2 * Math.PI);
                this.ctx.fill();
                
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                
                this.ctx.fillStyle = isNearMin ? '#f59e0b' : '#dc2626';
                this.ctx.beginPath();
                this.ctx.arc(screenM[0], screenM[1], 8, 0, 2 * Math.PI);
                this.ctx.fill();
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                
                this.ctx.fillStyle = '#333';
                this.ctx.font = 'bold 18px SimSun';
                this.ctx.fillText('P', screenP[0] + 12, screenP[1] + 20);
                this.ctx.fillText('M', screenM[0] + 12, screenM[1] - 8);
                
                const midAM = [(screenA[0] + screenM[0]) / 2, (screenA[1] + screenM[1]) / 2];
                this.ctx.fillStyle = isNearMin ? '#f59e0b' : '#2563eb';
                this.ctx.font = 'bold 16px SimSun';
                this.ctx.fillText(`AM = ${currentDistance.toFixed(3)}cm`, midAM[0], midAM[1] - 15);
                
                this.ctx.restore();
                
                if (this.isAnimating) {
                    this.mTrajectory.push([M[0], M[1]]);
                    if (this.mTrajectory.length &gt; 500) {
                        this.mTrajectory.shift();
                    }
                }
            }
            
            updateInfo() {
                const P = this.getCurrentP();
                const M = this.getCurrentM();
                const distance = this.getAMDistance();
                let thetaDegrees = this.theta * 180 / Math.PI;
                
                document.getElementById('pointP').textContent = `(${P[0].toFixed(2)}cm, ${P[1].toFixed(2)}cm)`;
                document.getElementById('pointM').textContent = `(${M[0].toFixed(2)}cm, ${M[1].toFixed(2)}cm)`;
                document.getElementById('distanceAM').textContent = distance.toFixed(3) + 'cm';
                document.getElementById('currentAngle').textContent = thetaDegrees.toFixed(1) + '&deg;';
                
                const progress = this.theta / Math.PI * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                
                document.getElementById('angleSlider').value = thetaDegrees;
                document.getElementById('angleValue').textContent = thetaDegrees.toFixed(1) + '&deg;';
            }
            
            startAnimation() {
                if (this.isAnimating) return;
                
                this.isAnimating = true;
                this.mTrajectory = [];
                
                const animate = () =&gt; {
                    if (!this.isAnimating) return;
                    
                    this.theta += this.direction * 0.015 * this.animationSpeed;
                    
                    if (this.theta &gt;= Math.PI) {
                        this.theta = Math.PI;
                        this.direction = -1;
                    } else if (this.theta &lt;= 0) {
                        this.theta = 0;
                        this.direction = 1;
                    }
                    
                    this.draw();
                    this.animationId = requestAnimationFrame(animate);
                };
                
                animate();
            }
            
            togglePause() {
                this.isAnimating = !this.isAnimating;
                if (this.isAnimating) {
                    this.startAnimation();
                } else {
                    cancelAnimationFrame(this.animationId);
                }
            }
            
            reset() {
                this.isAnimating = false;
                cancelAnimationFrame(this.animationId);
                this.theta = 0;
                this.mTrajectory = [];
                this.direction = 1;
                this.draw();
            }
        }
        
        window.addEventListener('load', () =&gt; {
            new GeometryDemo();
        });
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**

     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
