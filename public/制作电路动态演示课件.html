  &lt;script type=&quot;module&quot;&gt;
    // 电路状态
    const state = {
      s1: false,
      s2: false,
      s3: false
    };

    // 电流粒子动画实例
    let particleAnimations = [];

    // 更新开关按钮状态
    function updateSwitchButton(switchId, isOn) {
      const btn = document.getElementById(`btn-${switchId}`);
      const img = document.getElementById(`${switchId}-img`);
      
      if (isOn) {
        btn.textContent = '开启';
        btn.classList.remove('bg-secondary');
        btn.classList.add('bg-primary');
        img.setAttribute('href', 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/R3HDDL65Lb8pXKJYWuGd7a.jpg');
      } else {
        btn.textContent = '关闭';
        btn.classList.remove('bg-primary');
        btn.classList.add('bg-secondary');
        img.setAttribute('href', 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/e8dtEzLMYMkmD6KtA6esHe.jpg');
      }
    }

    // 更新灯泡状态
    function updateBulb(bulbId, isOn) {
      const img = document.getElementById(`${bulbId}-img`);
      const bulbGroup = document.getElementById(`bulb-${bulbId}`);
      
      if (isOn) {
        img.setAttribute('href', 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/NwpnswGf8uo3gH3QMJA4p7.jpg');
        bulbGroup.classList.add('bulb-glow', 'pulse-animation');
      } else {
        img.setAttribute('href', 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/mZ5QTqSjwyQagrs9GEh7YZ.jpg');
        bulbGroup.classList.remove('bulb-glow', 'pulse-animation');
      }
    }

    // 更新导线状态
    function updateWires() {
      // 清除所有导线的激活状态
      for (let i = 1; i &lt;= 9; i++) {
        const wire = document.getElementById(`wire${i}`);
        wire.setAttribute('class', 'wire');
      }

      // 如果S1闭合，激活主干线
      if (state.s1) {
        document.getElementById('wire1').setAttribute('class', 'wire-active');
        document.getElementById('wire2').setAttribute('class', 'wire-active');

        // L1支路
        if (state.s2) {
          document.getElementById('wire3').setAttribute('class', 'wire-active');
          document.getElementById('wire4').setAttribute('class', 'wire-active');
          document.getElementById('wire5').setAttribute('class', 'wire-active');
        }

        // L2支路
        if (state.s3) {
          document.getElementById('wire6').setAttribute('class', 'wire-active');
          document.getElementById('wire7').setAttribute('class', 'wire-active');
          document.getElementById('wire8').setAttribute('class', 'wire-active');
        }

        // 如果任一支路通电，回路也激活
        if (state.s2 || state.s3) {
          document.getElementById('wire9').setAttribute('class', 'wire-active');
        }
      }
    }

    // 创建电流粒子
    function createParticle(path, delay = 0) {
      const particle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      particle.setAttribute('r', '4');
      particle.setAttribute('class', 'current-particle');
      document.getElementById('particles-container').appendChild(particle);

      const pathElement = document.getElementById(path);
      const pathLength = pathElement.getTotalLength();

      const animation = anime({
        targets: particle,
        translateX: anime.path(pathElement).x,
        translateY: anime.path(pathElement).y,
        duration: 2000,
        delay: delay,
        easing: 'linear',
        loop: true
      });

      return { particle, animation };
    }

    // 清除所有电流粒子
    function clearParticles() {
      particleAnimations.forEach(({ particle, animation }) =&gt; {
        animation.pause();
        particle.remove();
      });
      particleAnimations = [];
    }

    // 更新电流动画
    function updateCurrentFlow() {
      clearParticles();

      if (!state.s1) return;

      // 主干线粒子
      particleAnimations.push(createParticle('wire1', 0));
      particleAnimations.push(createParticle('wire2', 200));

      // L1支路
      if (state.s2) {
        particleAnimations.push(createParticle('wire3', 400));
        particleAnimations.push(createParticle('wire4', 600));
        particleAnimations.push(createParticle('wire5', 800));
      }

      // L2支路
      if (state.s3) {
        particleAnimations.push(createParticle('wire6', 400));
        particleAnimations.push(createParticle('wire7', 600));
        particleAnimations.push(createParticle('wire8', 800));
      }

      // 回路
      if (state.s2 || state.s3) {
        particleAnimations.push(createParticle('wire9', 1000));
      }
    }

    // 更新电路状态显示
    function updateStatus() {
      const statusDiv = document.getElementById('circuit-status');
      const l1On = state.s1 &amp;&amp; state.s2;
      const l2On = state.s1 &amp;&amp; state.s3;

      let statusHTML = '';

      if (!state.s1) {
        statusHTML = `
          &lt;div class=&quot;flex items-center gap-2&quot;&gt;
            &lt;div class=&quot;w-3 h-3 rounded-full bg-secondary&quot;&gt;&lt;/div&gt;
            &lt;span&gt;主开关S₁未闭合，电路未通电&lt;/span&gt;
          &lt;/div&gt;
        `;
      } else {
        if (l1On &amp;&amp; l2On) {
          statusHTML = `
            &lt;div class=&quot;flex items-center gap-2&quot;&gt;
              &lt;div class=&quot;w-3 h-3 rounded-full bg-primary animate-pulse&quot;&gt;&lt;/div&gt;
              &lt;span class=&quot;font-bold text-primary&quot;&gt;两个灯泡都亮起&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;text-sm text-secondary mt-2&quot;&gt;
              电流从电源出发，分别经过S₂和S₃到达L₁和L₂
            &lt;/div&gt;
          `;
        } else if (l1On) {
          statusHTML = `
            &lt;div class=&quot;flex items-center gap-2&quot;&gt;
              &lt;div class=&quot;w-3 h-3 rounded-full bg-primary animate-pulse&quot;&gt;&lt;/div&gt;
              &lt;span class=&quot;font-bold text-primary&quot;&gt;L₁灯泡亮起&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;text-sm text-secondary mt-2&quot;&gt;
              电流经过S₁和S₂到达L₁
            &lt;/div&gt;
          `;
        } else if (l2On) {
          statusHTML = `
            &lt;div class=&quot;flex items-center gap-2&quot;&gt;
              &lt;div class=&quot;w-3 h-3 rounded-full bg-primary animate-pulse&quot;&gt;&lt;/div&gt;
              &lt;span class=&quot;font-bold text-primary&quot;&gt;L₂灯泡亮起&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;text-sm text-secondary mt-2&quot;&gt;
              电流经过S₁和S₃到达L₂
            &lt;/div&gt;
          `;
        } else {
          statusHTML = `
            &lt;div class=&quot;flex items-center gap-2&quot;&gt;
              &lt;div class=&quot;w-3 h-3 rounded-full bg-secondary&quot;&gt;&lt;/div&gt;
              &lt;span&gt;主开关已闭合，但支路开关未闭合&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;text-sm text-secondary mt-2&quot;&gt;
              需要闭合S₂或S₃才能点亮灯泡
            &lt;/div&gt;
          `;
        }
      }

      statusDiv.innerHTML = statusHTML;
    }

    // 更新整个电路
    function updateCircuit() {
      updateSwitchButton('s1', state.s1);
      updateSwitchButton('s2', state.s2);
      updateSwitchButton('s3', state.s3);

      const l1On = state.s1 &amp;&amp; state.s2;
      const l2On = state.s1 &amp;&amp; state.s3;

      updateBulb('l1', l1On);
      updateBulb('l2', l2On);
      updateWires();
      updateCurrentFlow();
      updateStatus();
    }

    // 开关点击事件
    document.getElementById('btn-s1').addEventListener('click', () =&gt; {
      state.s1 = !state.s1;
      updateCircuit();
    });

    document.getElementById('btn-s2').addEventListener('click', () =&gt; {
      state.s2 = !state.s2;
      updateCircuit();
    });

    document.getElementById('btn-s3').addEventListener('click', () =&gt; {
      state.s3 = !state.s3;
      updateCircuit();
    });

    // 场景切换
    window.setScenario = function(scenario) {
      switch(scenario) {
        case 'all-off':
          state.s1 = false;
          state.s2 = false;
          state.s3 = false;
          break;
        case 'l1-on':
          state.s1 = true;
          state.s2 = true;
          state.s3 = false;
          break;
        case 'l2-on':
          state.s1 = true;
          state.s2 = false;
          state.s3 = true;
          break;
        case 'both-on':
          state.s1 = true;
          state.s2 = true;
          state.s3 = true;
          break;
      }
      updateCircuit();
    };

    // 初始化
    updateCircuit();

    // 响应式布局调整
    function adjustLayout() {
      const width = window.innerWidth;
      if (width &lt; 768) {
        document.body.style.fontSize = '14px';
      } else {
        document.body.style.fontSize = '16px';
      }
    }

    window.addEventListener('resize', adjustLayout);
    adjustLayout();

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
